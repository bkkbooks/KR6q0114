body:
  text: 夫道者以寂滅為體脩者以離相為宗故經云寂滅是菩提滅諸相故佛者覺也人有覺心得菩提道故名為佛經云離一切諸相即名諸佛是知有相是無相之相不可以眼見唯可以智知若聞此法者生一念信心此人以發大乘超三界三界者貪嗔癡是返貪嗔癡為戒定慧即名超三界然貪嗔癡亦無實性但據眾生而言矣若能返照了了見貪嗔癡性即是佛性貪嗔癡外更無別有佛性經云諸佛從本來常處於三毒長養於白法而成於世尊三毒者貪嗔癡也言大乘最上乘者皆是菩薩所行之處無所不乘亦無所乘終日乘未甞乘此為佛乘經云無乘為佛乘也若人知六根不實五蘊假名遍體求之必無定處當知此人解佛語經云五蘊窟宅名禪院內照開解即大乘門可不明哉不憶一切法乃名為禪定若了此言者行住坐臥皆禪定知心是空名為見佛何以故十方諸佛皆以無心不見於心名為見佛捨身不恡名大布施離諸動定名大坐禪何以故凡夫一向動小乘一向定謂出過凡夫小乘之坐禪名大坐禪若作此會者一切諸相不求自解一切諸病不治自差此皆大禪定力凡將心求法者為迷不將心求法者為悟不著文字名解脫不染六塵名護法出離生死名出家不受後有名得道不生妄想名涅槃不處無明為大智慧無煩惱處名般涅槃無心相處名為彼岸迷時有此岸若悟時無此岸何以故為凡夫一向住此若覺最上乘者心不住此亦不住彼故能離於此彼岸也若見彼岸異於此岸此人之心已得無禪定煩惱名眾生悟解名菩提亦不一不異只隔具迷悟耳迷時有世間可出悟時無世間可出平等法中不見凡夫異於聖人經云平等法者凡夫不能入聖人不能行平等法者唯有大菩薩與諸佛如來行也若見生異於死動異於靜皆名不平等不見煩惱異於涅槃是名平等何以故煩惱與涅槃同是一性空故是以小乘人妄斷煩惱妄入涅槃為涅槃所滯菩薩知煩惱性空即不離空故常在涅槃涅槃者涅而不生槃而不死出離生死出般涅槃心無去來即入涅槃是知涅槃即是空心諸佛入涅槃者為在無妄想處菩薩入道場者即是無煩惱處空閑處者即是無貪嗔癡也貪為欲界嗔為色界癡為無色界若一念心生即入三界一念心滅即出三界是知三界生滅萬法有無皆由一心凡言一法者似破瓦石竹木無情之物若知心是假名無有實體即知自家之心亦是非有亦是非無何以故凡夫一向生心名為有小乘一向滅心名為無菩薩與佛未曾生心未曾滅心名為非有非無心非有非無心此名為中道是知持心學法則心法俱迷不持心學法則心法俱悟凡迷者迷於悟悟者悟於迷正見之人知心空無即超迷悟無有迷悟始名正解正見色不自色由心故色心不自心由色故心是知心色兩相俱生滅有者有於無無者無於有是名真見夫真見者無所不見亦無所見見滿十方未曾有見何以故無所見故見無見故見非見故凡夫所見皆名妄想若寂滅無見始名真見心境相對見生於中若內不起心則外不生境境心俱淨乃名為真見作此解時乃名正見不見一切法乃名得道不解一切法乃名解法何以故見與不見俱不見故解與不解俱不解故無見之見乃名真見無解之解乃名大解夫正見者非直見於見亦乃見於不見真解者非直解於解亦乃解於無解凡有所解皆名不解無所解者始名正解解與不解俱非解也經云不捨智慧名愚癡以心為空解與不解俱是真以心為有解與不解俱是妄若解時法逐人若不解時人逐法若法逐於人則非法成法若人逐於法則法成非法若人逐於法則法皆妄若法逐於人則法皆真是以聖人亦不將心求法亦不將法求心亦不將心求心亦不將法求法所以心不生法法不生心心法兩寂故常為在定眾生心生則佛法滅眾生心滅則佛法生心生則真法滅心滅則真法生已知一切法各各不相屬是名得道人知心不屬一切法此人常在道場迷時有罪解時無罪何以故罪性空故若迷時無罪見罪若解時即罪非罪何以故罪無處所故經云諸法無性真用莫疑疑即成罪何以故罪因疑惑而生若作此解者前世罪業即為消滅迷時六識五陰皆是煩惱生死法悟時六識五陰皆是涅槃無生死法脩道人不外求道何以故知心是道若得心時無心可得若得道時無道可得若言將心求道得者皆名邪見迷時有佛有法悟無佛無法何以故悟即是佛法夫脩道者身滅道成亦如甲折樹生此業報身念念無常無一定法但隨念修之亦不得厭生死亦不得愛生死但念念之中不得妄想則生證有餘涅槃死入無生法忍眼見色時不染於色耳聞聲時不染於聲皆解脫也眼不著色眼為禪門耳不著聲耳為禪門總而言見色有見色性不著常解脫見色相者常繫縛不為煩惱所繫縛者即名解脫更無別解脫善觀色者色不生心心不生色即色與心俱清淨無妄想時一心是一佛國有妄想時一心是一地獄眾生造作妄想以心生心故常在地獄菩薩觀察妄想不以心生心常在佛國若不以心生心則心心入空念念歸靜從一佛國至一佛國若以心生心則心心不靜念念歸動從一地獄歷一地獄若一念心起則有善惡二業有天堂地獄若一念心不起即無善惡二業亦無天堂地獄為體非有非無在凡即有在聖即無聖人無其心故胸臆空洞與天同量此已下並是大道中證非小乘及凡夫境界也心得涅槃時即不見有涅槃何以故心是涅槃若心外更見涅槃此名著邪見也一切煩惱為如來種心為因煩惱而得智慧只可道煩惱生如來不可得道煩惱是如來故身心為田疇煩惱為種子智慧為萠牙如來喻於穀也佛在心中如香在樹中煩惱若盡佛從心出朽腐若盡香從樹出即知樹外無香心外無佛若樹外有香即是他香心外有佛即是佗佛心中有三毒者是名國土穢惡心中無三毒者是名國土清淨經云若使國土不淨穢惡充滿諸佛世尊於中出者無有此事不淨穢惡者即無明三毒是諸佛世尊者即清淨覺悟心是一切言語無非佛法若能無其所言而盡日言是道若能有其所言即終日默而非道是故如來言不乘默默不乘言言不離默悟此言默者皆在三昧若知時而言言亦解脫若不知時而默默亦繫縛是故言若離相言亦名解脫默若著相默即是繫縛夫文字者本性解脫文字不能就繫縛繫縛自本來未就文字法無高下若見高下非法也非法為筏是法為人筏者人乘其筏者即得渡於非法則是法也若世俗言即有男女貴賤以道言之即無男女貴賤以是天女悟道不變女形車匿解真寧移賤稱乎此盖非男女貴賤皆由一相也天女於十二年中求女相了不可得即知於十二年中求男相亦不可得十二年者即十二入是也離心無佛離佛無心亦如離水無氷亦如離氷無水凡言離心者非是遠離於心但使不著心相經云不見相名為見佛即是離心相也離佛無心者言佛從心出心能生佛然佛從心生而心未甞生於佛亦如魚生於水水不生於魚欲觀於魚未見魚而先見水欲觀佛者未見佛而先見心即知已見魚者忘於水已見佛者忘於心若不忘於心尚為心所惑若不忘於水尚被水所迷眾生與菩提亦如氷之與水為三毒所燒即名眾生為三解脫所淨即名菩提為三冬所凍即名為氷為三夏所消即名為水若捨却冰即無別水若棄却眾生則無別菩提明知氷性即是水性水性即是氷性眾生性者即菩提性也眾生與菩提同一性亦如烏頭與附子共根耳但時節不同迷異境故有眾生菩提二名矣是以蛇化為龍不改其鱗凡變為聖不改其面但知心者智內照身者戒外真眾生度佛佛度眾生是名平等眾生度佛者煩惱生悟解佛度眾生者悟解滅煩惱是知非無煩惱非無悟解是知非煩惱無以生悟解非悟解無以滅煩惱若迷時佛度眾生若悟時眾生度佛何以故佛不自成皆由眾生度故諸佛以無明為父貪愛為母無明貪愛皆是眾生別名也眾生與無明亦如左掌與右掌更無別也迷時在此岸悟時在彼岸若知心空不見相則離迷悟既離迷悟亦無彼岸如來不在此岸亦不在彼岸不在中流中流者小乘人也此岸者凡夫也彼岸菩提也佛有三身者化身報身法身化身亦云應身若眾生常作善時即化身現脩智慧時即報身現覺無為即法身常現飛騰十方隨宜救濟者化身佛也若斷惑即是是雪山成道報身佛也無言無說無作無得湛然常住法身佛也若論至理一佛尚無何得有三此謂三身者但據人智也人有上中下說下智之人妄奧福力也妄見化身佛中智之人妄斷煩惱妄見報身佛上智之人妄證菩提妄見法身佛上上智之人內照圓寂明心即佛不待心而得佛智知三身與萬法皆不可取不可說此即解脫心成於大道經云佛不說法不度眾生不證菩提此之謂矣眾生造業業不造眾生今世造業後世受報無有脫時唯有至人於此身中不造諸業故不受報經云諸業不造自然得道豈虗言哉人能造業業不能造人人若造業業與人俱生人若不造業業與人俱滅是知業由人造人由業生人若不造業即業無由生人也亦如人能弘道道不能弘人今之凡夫往往造業妄說無報豈至少不苦哉若以至少而理前心造後心報何有脫時若前心不造即後心無報復安妄見業報經云雖信有佛言佛苦行是名邪見雖信有佛言佛有金鏘馬麥之報是名信不具足是名一闡提解聖法名為聖人解凡法者名為凡夫但能捨凡法就聖法即凡夫成聖人矣世間愚人但欲遠求聖人不信慧解之心為聖人也經云無智人中莫說此經經云心也法也無智之人不信此心解法成於聖人但欲遠外求學愛慕空中佛像光明香色等事皆墮邪見失心狂亂經云若見諸相非相即見如來八萬四千法門盡由一心而起若心相內淨由如虗空即出離身心內八萬四千煩惱為病本也凡夫當生憂死飽臨愁飢皆名大惑所以聖人不謀其前不慮其後無戀當今念念歸道若未悟此大理者即須早求人天之善無令兩失夜坐偈云一更端坐結跏趺怡神寂照泯同虗曠劫由來不生滅何須生滅滅無餘一切諸法皆如幻本性自空那用除若識心性非形像湛然不動自真如二更凝神轉明淨不起憶想同真性森羅萬像併歸空更執有空還是病諸法本自非空有凡夫妄想論邪正若能不二其居懷誰道即凡非是聖三更心淨等虗空遍滿十方無不通山河石壁無能障恒沙世界在其中世界本性真如性亦無無性即含融非但諸佛能如此有情之類並皆同四更無滅亦無生量與虗空法界平無去無來無起滅非有非無非暗明不起諸見如來見無名可名真佛名唯有悟者應能識未會眾生由若盲五更般若照無邊不起一念歷三千欲見真如平等性慎勿生心即目前妙理玄奧非心測不用尋逐令疲極若能無念即真求更若有求還不識真性頌
